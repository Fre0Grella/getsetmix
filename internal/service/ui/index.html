<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Getsetmix Staging</title>
    <link rel="stylesheet" href="/assets/styles.css" />
    <script defer src="/assets/app.js"></script>
  </head>
  <body>
    <header>
      <h1>Getsetmix</h1>
      <p class="subtitle">Staging UI</p>
    </header>

    <main>
      <section class="panel">
        <h2>Access</h2>
        <div class="row">
          <label for="token">Auth token</label>
          <input id="token" type="password" placeholder="Optional bearer token" />
          <button id="save-token" type="button">Save</button>
        </div>
        <p class="muted">If auth is enabled, paste the bearer token used for API calls.</p>
      </section>

      <section class="panel">
        <h2>Batch</h2>
        <div class="row">
          <button id="create-batch" type="button">Create Batch</button>
          <div class="pill" id="batch-id">No batch</div>
          <div class="pill" id="batch-running">Idle</div>
        </div>
      </section>

      <section class="panel">
        <h2>Stage a Source URL</h2>
        <div class="row">
          <label for="source-url">Source URL</label>
          <input id="source-url" type="url" placeholder="https://..." />
          <button id="stage-track" type="button">Preview &amp; Stage</button>
        </div>
        <div class="preview">
          <div class="preview-title" id="preview-title">No preview yet</div>
          <div class="preview-meta" id="preview-meta"></div>
        </div>
      </section>

      <section class="panel">
        <h2>Run Batch</h2>
        <div class="row">
          <button id="start-batch" type="button">Start Batch</button>
          <span id="status-message" class="muted"></span>
        </div>
      </section>

      <section class="panel">
        <h2>Staging List</h2>
        <div class="table">
          <div class="table-row table-head">
            <div>Track</div>
            <div>Source URL</div>
            <div>Status</div>
            <div>Error</div>
          </div>
          <div id="tracks"></div>
        </div>
      </section>
    </main>
  </body>
</html>
