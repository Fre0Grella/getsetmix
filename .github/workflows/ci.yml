name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just
      - name: Install adapter runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r adapter-runtime/requirements.txt
      - name: Install adapter runtime dev dependencies
        run: pip install -r adapter-runtime/requirements-dev.txt
      - name: Run lint and tests
        run: just ci
