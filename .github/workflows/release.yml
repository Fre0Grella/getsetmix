name: Release

# Automated semantic versioning. On every push to main, python-semantic-release
# reads the Conventional Commits since the last release and, when warranted,
# bumps the version (fix -> patch, feat -> minor, breaking change -> major),
# commits the bump, tags vX.Y.Z, and creates the GitHub Release. The downstream
# jobs then build the standalone executables and the versioned container images
# for that release — all in this one run, so no PAT / tag-trigger workarounds
# are needed. The release commit carries [skip ci], so it doesn't re-trigger.

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency: release
    outputs:
      released: ${{ steps.psr.outputs.released }}
      version: ${{ steps.psr.outputs.version }}
      tag: ${{ steps.psr.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so PSR can read commits + previous tags

      - name: Python Semantic Release
        id: psr
        uses: python-semantic-release/python-semantic-release@v9
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          build: "false"
          # main requires signed commits (branch protection), so the bot's
          # version-bump commit is SSH-signed with a key registered on the
          # repo owner's account. Committer email must be a verified email on
          # that account for the commit to show as "Verified".
          git_committer_name: "Marco Galeri"
          git_committer_email: "marcogaleri2002@gmail.com"
          ssh_public_signing_key: ${{ secrets.SSH_SIGNING_PUBLIC_KEY }}
          ssh_private_signing_key: ${{ secrets.SSH_SIGNING_PRIVATE_KEY }}

  executables:
    needs: release
    if: needs.release.outputs.released == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: getsetmix-windows-x64.exe
            built: dist/getsetmix.exe
            sep: ";"
            icon: "--icon app/static/assets/favicon.ico"
          - os: macos-latest
            artifact: getsetmix-macos-arm64
            built: dist/getsetmix
            sep: ":"
            icon: ""
          - os: ubuntu-latest
            artifact: getsetmix-linux-x64
            built: dist/getsetmix
            sep: ":"
            icon: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}   # build the freshly tagged code

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build executable
        shell: bash
        run: >
          pyinstaller --onefile --name getsetmix
          --add-data "app/static${{ matrix.sep }}app/static"
          --collect-all yt_dlp
          ${{ matrix.icon }}
          run_local.py

      - name: Smoke-test the binary
        shell: bash
        run: ${{ matrix.built }} --help

      - name: Rename artifact
        shell: bash
        run: mv "${{ matrix.built }}" "dist/${{ matrix.artifact }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error

  attach:
    needs: [release, executables]
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release.outputs.tag }}
          files: dist/*
          fail_on_unmatched_files: true
          body: |
            Standalone **local app mode** builds — no Python required.
            `ffmpeg` must be on your PATH (`winget install ffmpeg` / `brew install ffmpeg` / `apt install ffmpeg`).

            Run the binary and the UI opens at http://127.0.0.1:8765 (data is kept in `~/.getsetmix`).

  image:
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # v1.2.3 -> :1.2.3, :1.2, :1
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release.outputs.tag }}
            type=semver,pattern={{major}},value=${{ needs.release.outputs.tag }}

      - name: Build & push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
