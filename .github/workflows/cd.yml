name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just
      - name: Install adapter runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r adapter-runtime/requirements.txt
      - name: Install adapter runtime dev dependencies
        run: pip install -r adapter-runtime/requirements-dev.txt
      - name: Run lint and tests
        run: just ci
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push getsetmix image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
      - name: Build and push adapter runtime image
        uses: docker/build-push-action@v6
        with:
          context: ./adapter-runtime
          file: ./adapter-runtime/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-adapter-runtime:latest
            ghcr.io/${{ github.repository }}-adapter-runtime:${{ github.sha }}
