apiVersion: apps/v1
kind: Deployment
metadata:
  name: getsetmix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: getsetmix
  template:
    metadata:
      labels:
        app: getsetmix
    spec:
      containers:
        - name: getsetmix
          image: ghcr.io/fre0grella/getsetmix:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: getsetmix-config
          env:
            # Optional: set a static token (e.g. for use via VPN/Tailscale).
            # Create a Secret named `getsetmix-auth` with key `token`.
            - name: GSM_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: getsetmix-auth
                  key: token
                  optional: true
          volumeMounts:
            - name: rekordbox-library
              mountPath: /library
              readOnly: false
            - name: state
              mountPath: /data
            - name: adapter-cache
              mountPath: /cache
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
        - name: adapter-runtime
          image: ghcr.io/fre0grella/getsetmix-adapter-runtime:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: adapter-http
              containerPort: 9000
          envFrom:
            - configMapRef:
                name: getsetmix-config
          volumeMounts:
            - name: rekordbox-library
              mountPath: /library
              readOnly: false
            - name: adapter-cache
              mountPath: /cache
      volumes:
        # User-provided PVC that points at the Rekordbox Library root.
        # Create a PVC with this name (or edit claimName) that is also used by Nextcloud.
        - name: rekordbox-library
          persistentVolumeClaim:
            claimName: rekordbox-library
        - name: state
          persistentVolumeClaim:
            claimName: getsetmix-state
        - name: adapter-cache
          emptyDir: {}
